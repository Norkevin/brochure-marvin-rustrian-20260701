<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Marvin Rustrian</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #111;
    color: #eaeaea;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: 32px 16px 80px;
  }
  .card {
    max-width: 480px;
    margin: 0 auto;
    background: #1a1a1a;
    border-radius: 16px;
    padding: 28px 24px;
  }
  .head {
    text-align: center;
    margin-bottom: 28px;
  }
  .head .label {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }
  .head h1 {
    font-size: 24px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .head .sub {
    font-size: 13px;
    color: #999;
    margin-top: 4px;
  }

  h2 {
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #888;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #2a2a2a;
  }

  .evento {
    background: #222;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .evento .fecha {
    flex: 0 0 56px;
    text-align: center;
    background: #2a2a2a;
    border-radius: 8px;
    padding: 8px 4px;
  }
  .evento .fecha .dia {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .evento .fecha .mes {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #999;
    margin-top: 4px;
  }
  .evento .info { flex: 1; }
  .evento .info .nom {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 2px;
  }
  .evento .info .lugar {
    font-size: 13px;
    color: #aaa;
  }
  .evento .info .rol {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c9a96e;
    background: #2a2418;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .contacto {
    text-align: center;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid #2a2a2a;
  }
  .contacto .ig {
    font-size: 15px;
    color: #fff;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .contacto .nota {
    font-size: 12px;
    color: #888;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="label">Agenda 2026–2027</div>
      <h1>Marvin Rustrian</h1>
      <div class="sub">Segunda Cámara · Norkevin Photography</div>
    </div>

    <h2>Próximos eventos</h2>

    <div class="evento">
      <div class="fecha">
        <div class="dia">21</div>
        <div class="mes">Nov 26</div>
      </div>
      <div class="info">
        <div class="nom">Andrea Cano</div>
        <div class="lugar">Parque Las Américas, Ciudad</div>
        <span class="rol">Segunda Cámara</span>
      </div>
    </div>

    <div class="evento">
      <div class="fecha">
        <div class="dia">23</div>
        <div class="mes">Ene 27</div>
      </div>
      <div class="info">
        <div class="nom">Astrid Cerón Alonzo</div>
        <div class="lugar">Museo de La Merced, Ciudad</div>
        <span class="rol">Segunda Cámara</span>
      </div>
    </div>

    <div class="contacto">
      <div class="ig">@mrustrian_gt</div>
      <div class="nota">Instagram · Bodas y retratos</div>
    </div>
  </div>
</body>
</html>
